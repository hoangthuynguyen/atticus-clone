name: Push Add-on to Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'addon/**'
      - '.github/workflows/publish-addon.yml'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push to Apps Script
        run: cd addon && clasp push --force

      - name: Verify
        run: echo "Add-on code pushed to Apps Script successfully"
