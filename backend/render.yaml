# =============================================================================
# Render.com Service Configuration
# Free tier: 512MB RAM, 0.1 CPU, spins down after 15 min inactivity
# Use GitHub Actions keep-alive to prevent cold starts
# =============================================================================

services:
  - type: web
    name: atticus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Set these in Render Dashboard (Environment tab):
      # - FRONTEND_URL         (e.g. https://your-project.pages.dev)
      # - GOOGLE_CLIENT_ID
      # - GOOGLE_CLIENT_SECRET
      # - SUPABASE_URL
      # - SUPABASE_SERVICE_KEY
      # - R2_ACCOUNT_ID
      # - R2_ACCESS_KEY_ID
      # - R2_SECRET_ACCESS_KEY
      # - R2_BUCKET_NAME
      # - R2_ENDPOINT
      # - UPSTASH_REDIS_REST_URL
      # - UPSTASH_REDIS_REST_TOKEN
